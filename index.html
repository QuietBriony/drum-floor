<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Drum Floor | Band Groove Generator</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header class="topbar">
      <a class="brand" href="./" aria-label="Drum Floor home">
        <span class="brand-mark" aria-hidden="true"></span>
        <span>
          <strong>Drum Floor</strong>
          <small>Band Groove Generator</small>
        </span>
      </a>
      <nav class="nav-links" aria-label="Research documents">
        <a href="docs/groove/groove-decision-model.md">Decision</a>
        <a href="docs/groove/groove-grammar-v1.md">Grammar</a>
        <a href="docs/groove/fill-and-transition-policy.md">Fills</a>
        <a href="docs/groove/evaluation-rubric-v1.md">Rubric</a>
        <a href="docs/groove/future-runtime-contract.md">Runtime</a>
      </nav>
    </header>

    <main class="app-shell">
      <section class="hero">
        <div>
          <p class="eyebrow">profile driven drum feel</p>
          <h1>Shape band grooves before runtime exists.</h1>
        </div>
        <div class="policy-strip" aria-label="Policy checks">
          <span>No audio</span>
          <span>No samples</span>
          <span>Metadata only</span>
          <span>No runtime</span>
        </div>
      </section>

      <section class="workbench" aria-label="Groove profile workbench">
        <aside class="selector-panel">
          <div class="panel-heading">
            <p class="eyebrow">style profiles</p>
            <span id="profile-count">loading</span>
          </div>
          <div class="profile-list" id="profile-list" role="listbox" aria-label="Style profiles"></div>
        </aside>

        <section class="detail-panel">
          <div class="profile-head">
            <div>
              <p class="eyebrow" id="profile-id">profile</p>
              <h2 id="profile-label">Loading profiles</h2>
              <p id="profile-description">Reading profiles/groove-profiles.json</p>
            </div>
            <a class="json-link" href="profiles/groove-profiles.json">JSON</a>
          </div>

          <div class="tabbar" role="tablist" aria-label="Profile views">
            <button class="tab-button is-active" type="button" data-view="profile">Profile</button>
            <button class="tab-button" type="button" data-view="translation">Drum feel</button>
            <button class="tab-button" type="button" data-view="policy">Policy</button>
          </div>

          <div class="view-stack">
            <div class="view is-active" id="view-profile"></div>
            <div class="view" id="view-translation"></div>
            <div class="view" id="view-policy"></div>
          </div>
        </section>
      </section>
    </main>

    <script src="app.js"></script>
  </body>
</html>
